version: '3.8'

services:
  mstodo_web:
    build: .
    container_name: mstodo_web
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - .:/app
    environment:
      - TZ=Asia/Seoul
      - MS_CLIENT_ID=
      - MS_CLIENT_SECRET=
    command: >
      sh -c "gunicorn --bind 0.0.0.0:5001 --timeout 600 app:app & 
             python3 sync_worker.py"
