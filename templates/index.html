<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 | Microsoft To Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background-color: #f8fafc; 
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Subtle Animated Background */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            overflow: hidden;
        }
        .blob {
            position: absolute;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(59, 130, 246, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate ease-in-out;
        }
        .blob-2 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, rgba(99, 102, 241, 0) 70%);
            top: 15%; right: -10%;
            animation-duration: 25s; animation-delay: -5s;
        }
        .blob-3 {
            width: 900px; height: 900px;
            background: radial-gradient(circle, rgba(147, 197, 253, 0.08) 0%, rgba(147, 197, 253, 0) 70%);
            bottom: -15%; left: 5%;
            animation-duration: 30s; animation-delay: -10s;
        }
        @keyframes move {
            0% { transform: translate(-5%, -5%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(180deg); }
        }

        /* Initial Spacious Layout */
        .task-card { 
            transition: all 0.2s ease; 
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #f1f5f9;
        }
        .task-card:hover { 
            transform: translateY(-1.5px); 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.04); 
            border-color: #e2e8f0;
        }
        .completed { text-decoration: line-through; color: #94a3b8; opacity: 0.6; }
        .fade-out { opacity: 0; transform: translateX(20px); transition: all 0.4s ease; }
        
        .chip { transition: all 0.2s; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
        .chip.active { background-color: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2); }
        
        .sidebar-item { transition: all 0.2s; cursor: pointer; border-radius: 0.75rem; white-space: nowrap; }
        .sidebar-item.active { background-color: #3b82f6 !important; color: white !important; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sidebar { height: calc(100vh - 4rem); position: sticky; top: 2rem; }

        /* Inline Edit Styling */
        [contenteditable="true"]:focus {
            outline: none;
            background: rgba(241, 245, 249, 0.5);
            border-radius: 4px;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            padding: 0 4px;
        }
        
        /* Star Hover Effect */
        .star-btn:hover i { transform: scale(1.2); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="bg-animate">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="max-w-6xl mx-auto relative">
        <div class="flex flex-col md:flex-row gap-8">
            <!-- Sidebar (Desktop Viewport) -->
            <aside class="md:w-64 flex-shrink-0 hidden md:block">
                <div class="sidebar flex flex-col">
                    <div class="mb-6 px-1 flex items-center space-x-3">
                        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                            <i class="fas fa-check-double text-white text-sm"></i>
                        </div>
                        <h1 class="text-2xl font-black text-slate-800 tracking-tight">to-do list</h1>
                    </div>

                    <nav class="space-y-1 overflow-y-auto no-scrollbar" id="sidebar-list">
                        <!-- Lists will be injected here -->
                    </nav>

                    <div class="mt-auto pt-6 px-2 flex items-center justify-between">
                        <a href="/settings" class="w-9 h-9 flex items-center justify-center rounded-full text-slate-400 hover:bg-white hover:text-blue-600 transition-all border border-transparent hover:border-slate-200" title="설정">
                            <i class="fas fa-cog text-xl"></i>
                        </a>
                        <button onclick="fetchTasks()" class="flex items-center space-x-2 bg-white/60 backdrop-blur-md px-4 py-2 rounded-full border border-slate-200/50 shadow-sm hover:bg-white hover:text-blue-500 transition-all active:scale-95 group">
                            <span class="text-xs font-bold text-slate-500 group-hover:text-blue-500">업데이트</span>
                            <i class="fas fa-sync-alt text-[10px] text-slate-300 group-hover:text-blue-500" id="refresh-icon-desktop"></i>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Mobile Viewport -->
            <div class="md:hidden w-full">
                <header class="mb-4">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center space-x-3">
                            <h1 class="text-2xl font-black text-slate-800 tracking-tight">나의 할 일</h1>
                            <a href="/settings" class="w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:bg-white hover:text-blue-600 transition-all" title="설정">
                                <i class="fas fa-cog text-xl"></i>
                            </a>
                        </div>
                        <button onclick="fetchTasks()" class="flex items-center space-x-2 bg-white/60 backdrop-blur-md px-4 py-2 rounded-full border border-slate-200/50 shadow-sm group">
                            <span class="text-xs font-bold text-slate-500">업데이트</span>
                            <i class="fas fa-sync-alt text-[10px] text-slate-300" id="refresh-icon-mobile"></i>
                        </button>
                    </div>
                    <!-- Mobile Chips with No-Wrap and Horizontal Scroll -->
                    <div id="list-container" class="flex flex-row flex-nowrap overflow-x-auto space-x-2 pb-2 no-scrollbar select-none w-full">
                        <!-- Lists injected here -->
                    </div>
                </header>
            </div>

            <!-- Main Content -->
            <main class="flex-grow max-w-3xl">
                <!-- Task Input (Restored Spacious Size) -->
                <div class="relative group mb-6 md:mb-8">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                        <i class="fas fa-pen-nib"></i>
                    </div>
                    <input type="text" id="task-input" 
                           placeholder="어떤 일을 완료할까요?"
                           class="w-full pl-11 pr-12 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-slate-700 font-medium text-[15px]"
                           onkeypress="if(event.key === 'Enter') addTask()">
                    <button onclick="addTask()" class="absolute right-2 top-2 bottom-2 px-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl transition-all shadow-md hover:shadow-lg active:scale-95">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

                <!-- Loading State -->
                <div id="loading" class="flex flex-col items-center justify-center py-24 space-y-4">
                    <div class="relative w-12 h-12">
                        <div class="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <p class="text-sm font-semibold text-slate-400 animate-pulse">할 일을 불러오는 중...</p>
                </div>

                <!-- Task List (Initial Spacious Gap) -->
                <div id="task-list" class="space-y-3 hidden">
                    <!-- Tasks injected here -->
                </div>

                <!-- Empty State (Initial Spacious Style) -->
                <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 bg-white rounded-3xl border border-dashed border-slate-200 shadow-inner">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                        <i class="fas fa-check-double text-slate-200 text-4xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-700 mb-1">모든 할 일을 마쳤습니다!</h3>
                    <p class="text-slate-400 text-sm font-medium">새로운 할 일을 추가하고 오늘을 기록해보세요.</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        let currentListId = null;
        let isProcessing = false;
        let cachedTasks = [];

        async function fetchLists() {
            try {
                const response = await fetch('/api/lists');
                const lists = await response.json();
                
                const mobileContainer = document.getElementById('list-container');
                const sidebarContainer = document.getElementById('sidebar-list');
                
                mobileContainer.innerHTML = '';
                sidebarContainer.innerHTML = '';

                lists.forEach((list, index) => {
                    const chip = document.createElement('div');
                    chip.id = `chip-${list.id}`;
                    chip.className = 'chip px-4 py-2 rounded-xl border border-slate-200 bg-white text-slate-600 text-[14px] font-bold shadow-sm transition-all';
                    chip.innerHTML = `<i class="fas fa-list-ul mr-2 opacity-40"></i>${list.name}`;
                    chip.onclick = () => selectList(list.id);
                    mobileContainer.appendChild(chip);

                    const item = document.createElement('div');
                    item.id = `side-chip-${list.id}`;
                    item.className = 'sidebar-item group flex items-center px-4 py-3 text-slate-500 font-bold hover:bg-white/60 transition-all text-[15px]';
                    
                    let icon = 'fa-list-ul';
                    if (list.wellKnownName === 'defaultList') icon = 'fa-inbox';
                    else if (list.wellKnownName === 'flaggedEmails') icon = 'fa-envelope';
                    
                    item.innerHTML = `
                        <i class="fas ${icon} mr-3 opacity-40 group-[.active]:opacity-100"></i>
                        <span class="truncate">${list.name}</span>
                    `;
                    item.onclick = () => selectList(list.id);
                    sidebarContainer.appendChild(item);

                    // 첫 번째 리스트를 기본값으로 선택
                    if (index === 0 && currentListId === null) {
                        selectList(list.id);
                    }
                });
            } catch (err) { console.error('Failed to fetch lists', err); }
        }

        function selectList(id) {
            if (!id) return;
            currentListId = id;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            const activeChip = document.getElementById(`chip-${id}`);
            if (activeChip) {
                activeChip.classList.add('active');
                activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            document.querySelectorAll('.sidebar-item').forEach(c => c.classList.remove('active'));
            const activeSide = document.getElementById(`side-chip-${id}`);
            if (activeSide) activeSide.classList.add('active');
            fetchTasks();
        }

        async function fetchTasks(silent = false) {
            if (!currentListId) return;
            const loading = document.getElementById('loading');
            const taskList = document.getElementById('task-list');
            const emptyState = document.getElementById('empty-state');
            const icons = [document.getElementById('refresh-icon-mobile'), document.getElementById('refresh-icon-desktop')];

            if (!silent) {
                loading.classList.remove('hidden');
                taskList.classList.add('hidden');
                emptyState.classList.add('hidden');
            }
            icons.forEach(i => i && i.classList.add('fa-spin'));

            try {
                const url = `/api/tasks?list_id=${currentListId}`;
                const response = await fetch(url);
                cachedTasks = await response.json();
                if (cachedTasks.length === 0) {
                    taskList.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                } else {
                    sortAndRenderTasks();
                    taskList.classList.remove('hidden');
                    emptyState.classList.add('hidden');
                }
            } catch (err) { console.error(err); } 
            finally {
                loading.classList.add('hidden');
                icons.forEach(i => i && i.classList.remove('fa-spin'));
            }
        }

        function sortAndRenderTasks() {
            // 중요도(high 우선), 마감일 순으로 정렬
            cachedTasks.sort((a, b) => {
                // 1. 중요도 (high가 0, normal이 1로 평가되도록)
                const aImp = a.importance === 'high' ? 0 : 1;
                const bImp = b.importance === 'high' ? 0 : 1;
                if (aImp !== bImp) return aImp - bImp;

                // 2. 마감일 (null은 뒤로)
                if (a.due_date && !b.due_date) return -1;
                if (!a.due_date && b.due_date) return 1;
                if (a.due_date && b.due_date) {
                    return a.due_date.localeCompare(b.due_date);
                }
                return 0;
            });
            renderTasks(cachedTasks);
        }

        function parseDate(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.split('-');
            // 연, 월(0-11), 일로 Date 객체 생성 (로컬 시간 기준)
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        function renderTasks(tasks) {
            const container = document.getElementById('task-list');
            container.innerHTML = '';
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            
            const endOfWeek = new Date(today);
            const diff = 7 - (today.getDay() === 0 ? 7 : today.getDay());
            endOfWeek.setDate(today.getDate() + diff);
            endOfWeek.setHours(23, 59, 59, 999);

            tasks.forEach(task => {
                const card = document.createElement('div');
                card.id = `task-${task.id}`;
                
                const isImportant = task.importance === 'high';
                const dueDate = parseDate(task.due_date);
                
                const isToday = dueDate && dueDate.getTime() === today.getTime();
                const isTomorrow = dueDate && dueDate.getTime() === tomorrow.getTime();
                const isOverdue = dueDate && dueDate < today;
                const isThisWeek = dueDate && !isToday && !isTomorrow && !isOverdue && dueDate <= endOfWeek;

                // 테두리 및 배경 색상 결정 로직
                let borderColor = 'border-slate-100';
                let bgColor = 'bg-white';
                let borderSize = 'border';
                
                if (isImportant) {
                    borderColor = 'border-amber-400 shadow-md shadow-amber-50';
                    bgColor = 'bg-amber-50/30';
                    borderSize = 'border-2';
                } else if (isOverdue) {
                    borderColor = 'border-rose-400 shadow-sm';
                    bgColor = 'bg-rose-50/20';
                    borderSize = 'border-[1.5px]';
                } else if (isToday) {
                    borderColor = 'border-emerald-400 shadow-sm';
                    bgColor = 'bg-emerald-50/20';
                    borderSize = 'border-[1.5px]';
                } else if (isTomorrow) {
                    borderColor = 'border-blue-400 shadow-sm';
                    bgColor = 'bg-blue-50/10';
                    borderSize = 'border-[1.5px]';
                } else if (isThisWeek) {
                    borderColor = 'border-sky-300';
                    bgColor = 'bg-sky-50/5';
                }

                card.className = `group task-card ${bgColor} p-4 rounded-2xl ${borderSize} ${borderColor} flex flex-col transition-all`;
                
                let subtasksHtml = '';
                if (task.subtasks && task.subtasks.length > 0) {
                    subtasksHtml = `
                        <div class="mt-3 ml-10 space-y-2.5 border-l-2 border-slate-100 pl-4 py-1">
                            ${task.subtasks.map(st => `
                                <div class="flex items-center space-x-3 group/sub">
                                    <input type="checkbox" ${st.isChecked ? 'checked' : ''} 
                                           onchange="toggleSubtask('${task.list_id}', '${task.id}', '${st.id}', this.checked, this)"
                                           class="w-4 h-4 rounded border-slate-300 text-blue-500 focus:ring-blue-500/20 cursor-pointer">
                                    <span class="text-[13px] ${st.isChecked ? 'line-through text-slate-400 font-medium' : 'text-slate-600 font-semibold'} transition-all cursor-default">
                                        ${st.displayName}
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="flex-shrink-0">
                            <div class="relative w-6 h-6">
                                <input type="checkbox" onchange="completeTask('${task.list_id}', '${task.id}')"
                                       class="peer appearance-none w-6 h-6 rounded-full border-2 border-slate-200 checked:bg-blue-500 checked:border-blue-500 transition-all cursor-pointer">
                                <i class="fas fa-check absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[10px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="flex-grow min-w-0">
                            <div class="flex items-center space-x-2">
                                <h3 class="text-[15px] font-bold text-slate-700 group-hover:text-blue-900 transition-colors outline-none"
                                    contenteditable="true"
                                    onblur="updateTaskTitle('${task.list_id}', '${task.id}', this)"
                                    onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }">
                                    ${task.title}
                                </h3>
                                <button onclick="toggleImportance('${task.list_id}', '${task.id}', '${task.importance}')" 
                                        class="star-btn ml-1 focus:outline-none transition-all">
                                    ${isImportant ? 
                                        '<i class="fas fa-star text-amber-500 text-sm"></i>' : 
                                        '<i class="far fa-star text-amber-400 text-sm opacity-0 group-hover:opacity-100 transition-opacity"></i>'}
                                </button>
                            </div>
                            <div class="flex items-center text-[11px] mt-1.5 space-x-3 text-slate-400 font-bold uppercase tracking-widest">
                                <span class="flex items-center"><i class="fas fa-folder mr-1.5 opacity-60"></i>${task.list_name}</span>
                                ${task.due_date ? `
                                    <span class="flex items-center ${isOverdue ? 'text-rose-500' : (isToday ? 'text-emerald-600' : (isTomorrow ? 'text-blue-600' : ''))}">
                                        <i class="far fa-calendar-check mr-1.5 opacity-60"></i>
                                        ${formatDate(task.due_date)}
                                    </span>` : ''}
                            </div>
                        </div>
                    </div>
                    ${subtasksHtml}
                `;
                container.appendChild(card);
            });
        }

        async function toggleSubtask(listId, taskId, subtaskId, checked, element) {
            const label = element.nextElementSibling;
            
            // UI 즉시 반영 (Optimistic UI)
            if (checked) {
                label.classList.add('line-through', 'text-slate-400', 'font-medium');
                label.classList.remove('text-slate-600', 'font-semibold');
            } else {
                label.classList.remove('line-through', 'text-slate-400', 'font-medium');
                label.classList.add('text-slate-600', 'font-semibold');
            }

            try {
                const response = await fetch(`/api/subtask/complete/${listId}/${taskId}/${subtaskId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ checked: checked })
                });
                if (!response.ok) throw new Error('업데이트 실패');
            } catch (err) {
                alert('서브태스크 업데이트 중 오류가 발생했습니다.');
                console.error(err);
                
                // 오류 시 UI 원복
                element.checked = !checked;
                if (!checked) {
                    label.classList.add('line-through', 'text-slate-400', 'font-medium');
                    label.classList.remove('text-slate-600', 'font-semibold');
                } else {
                    label.classList.remove('line-through', 'text-slate-400', 'font-medium');
                    label.classList.add('text-slate-600', 'font-semibold');
                }
            }
        }

        function formatDate(dateStr) {
            const d = parseDate(dateStr);
            if (!d) return '';
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            if (d.getTime() === today.getTime()) return '오늘';
            return (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
        }

        async function addTask() {
            const input = document.getElementById('task-input');
            const title = input.value.trim();
            if (!title) return;
            let targetListId = currentListId;
            if (!targetListId) {
                const sidebarItems = document.querySelectorAll('.sidebar-item');
                if (sidebarItems.length > 0) targetListId = sidebarItems[0].id.replace('side-chip-', '');
                else { alert('목록 정보를 불러오는 중입니다...'); return; }
            }
            isProcessing = true;
            input.disabled = true;
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, list_id: targetListId })
                });
                if (response.ok) { input.value = ''; await fetchTasks(); }
            } finally { input.disabled = false; isProcessing = false; input.focus(); }
        }

        async function completeTask(listId, taskId) {
            const card = document.getElementById(`task-${taskId}`);
            card.classList.add('completed');
            try {
                await fetch(`/api/complete/${listId}/${taskId}`, { method: 'POST' });
                card.classList.add('fade-out');
                setTimeout(() => card.remove(), 400);
            } catch (err) { card.classList.remove('completed'); card.querySelector('input').checked = false; }
        }

        async function updateTaskTitle(listId, taskId, element) {
            const newTitle = element.innerText.trim();
            if (!newTitle) return;
            try {
                const response = await fetch(`/api/tasks/${listId}/${taskId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle })
                });
                if (!response.ok) throw new Error('Update failed');
            } catch (err) {
                console.error(err);
                alert('일정 수정 중 오류가 발생했습니다.');
            }
        }

        async function toggleImportance(listId, taskId, currentImportance) {
            const newImportance = currentImportance === 'high' ? 'normal' : 'high';
            
            // Optimistic UI: 로컬 데이터 즉시 업데이트 및 재정렬
            const taskIndex = cachedTasks.findIndex(t => t.id === taskId);
            if (taskIndex !== -1) {
                cachedTasks[taskIndex].importance = newImportance;
                sortAndRenderTasks();
            }

            try {
                const response = await fetch(`/api/tasks/${listId}/${taskId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ importance: newImportance })
                });
                if (!response.ok) throw new Error('Update failed');
            } catch (err) {
                console.error(err);
                // 실패 시 원복
                if (taskIndex !== -1) {
                    cachedTasks[taskIndex].importance = currentImportance;
                    sortAndRenderTasks();
                }
                alert('중요도 변경 중 오류가 발생했습니다.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => { fetchLists(); });
    </script>
</body>
</html>
