<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 할 일 대시보드 | Microsoft To Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
            overflow: hidden;
        }
        
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.07) 0%, rgba(59, 130, 246, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 25s infinite alternate ease-in-out;
        }
        
        .blob-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.07) 0%, rgba(99, 102, 241, 0) 70%);
            top: 20%;
            right: -10%;
            animation-duration: 35s;
            animation-delay: -5s;
        }
        
        .blob-3 {
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(147, 197, 253, 0.08) 0%, rgba(147, 197, 253, 0) 70%);
            bottom: -20%;
            left: 10%;
            animation-duration: 40s;
            animation-delay: -10s;
        }

        @keyframes move {
            0% { transform: translate(-5%, -5%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(180deg); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.03);
        }

        .task-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            background: rgba(255, 255, 255, 0.8);
        }
        .task-card:hover { 
            transform: translateY(-2px) scale(1.01); 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.06); 
            background: white;
        }
        .completed { text-decoration: line-through; color: #94a3b8; opacity: 0.6; }
        .fade-out { opacity: 0; transform: translateX(20px); transition: all 0.4s ease; }
        .chip { transition: all 0.2s; cursor: pointer; white-space: nowrap; }
        .chip.active { background-color: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #list-container { cursor: grab; user-select: none; }
        #list-container:active { cursor: grabbing; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="bg-animate">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="max-w-3xl mx-auto relative">
        <header class="mb-8">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i class="fas fa-check-double text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-none">나의 할 일</h1>
                        <p class="text-[11px] font-bold text-slate-400 mt-1 uppercase tracking-wider">Workspace Dashboard</p>
                    </div>
                    <a href="/settings" class="ml-2 w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:bg-white hover:text-blue-600 transition-all border border-transparent hover:border-slate-200" title="설정">
                        <i class="fas fa-cog text-lg"></i>
                    </a>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="fetchTasks()" class="flex items-center space-x-2 px-3 py-1.5 bg-white/50 backdrop-blur-sm border border-slate-200/50 rounded-full hover:bg-white hover:border-blue-300 hover:shadow-sm transition-all group">
                        <span id="auto-refresh-timer" class="text-xs font-mono font-bold text-slate-500 group-hover:text-blue-600">10s</span>
                        <i class="fas fa-sync-alt text-xs text-slate-300 group-hover:text-blue-500" id="refresh-icon"></i>
                    </button>
                </div>
            </div>

            <!-- List Selection (Chips) -->
            <div id="list-container" class="flex overflow-x-auto space-x-2 pb-3 no-scrollbar mb-8 select-none">
                <div onclick="selectList(null)" id="chip-all" class="chip active px-5 py-2.5 rounded-2xl border border-slate-200 bg-white text-slate-600 text-sm font-bold shadow-sm">
                    <i class="fas fa-layer-group mr-2 opacity-50"></i>전체
                </div>
                <!-- Lists will be injected here -->
            </div>

            <!-- Task Input -->
            <div class="relative group">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                    <i class="fas fa-plus-circle text-lg"></i>
                </div>
                <input type="text" id="task-input" 
                       placeholder="어떤 일을 완료할까요?"
                       class="w-full pl-12 pr-14 py-5 bg-white/70 backdrop-blur-md border border-slate-200 rounded-[24px] shadow-sm focus:ring-8 focus:ring-blue-500/5 focus:border-blue-500/50 outline-none transition-all text-slate-700 font-semibold placeholder:text-slate-400 placeholder:font-medium"
                       onkeypress="if(event.key === 'Enter') addTask()">
                <button onclick="addTask()" class="absolute right-2.5 top-2.5 bottom-2.5 px-5 bg-blue-500 hover:bg-blue-600 text-white rounded-[18px] transition-all shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 active:scale-95">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </header>

        <div id="loading" class="flex flex-col items-center justify-center py-24 space-y-4">
            <div class="relative w-14 h-14">
                <div class="absolute inset-0 border-4 border-blue-500/10 rounded-2xl"></div>
                <div class="absolute inset-0 border-4 border-blue-500 rounded-2xl border-t-transparent animate-spin"></div>
            </div>
            <p class="text-xs font-bold text-slate-400 animate-pulse tracking-widest uppercase">데이터를 동기화 중...</p>
        </div>

        <div id="task-list" class="space-y-3.5 hidden">
            <!-- Tasks will be injected here -->
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-28 glass-panel rounded-[40px] border border-dashed border-slate-300/50">
            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-8 shadow-inner">
                <i class="fas fa-mug-hot text-blue-200 text-4xl"></i>
            </div>
            <h3 class="text-xl font-black text-slate-800 mb-2">오늘의 할 일을 모두 마쳤습니다!</h3>
            <p class="text-slate-400 text-sm font-medium">커피 한 잔의 여유를 즐겨보세요.</p>
        </div>
    </div>

    <script>
        let currentListId = null;
        let allListIds = [null];
        let lastActivity = Date.now();
        let refreshSecondsLeft = 10;
        let isProcessing = false;

        // Swipe Gesture Variables
        let touchStartX = 0;
        let touchEndX = 0;
        const minSwipeDistance = 50;

        // Auto Refresh logic
        setInterval(() => {
            if (isProcessing) return;
            
            // Check if user is typing
            const isTyping = document.activeElement === document.getElementById('task-input');
            if (isTyping) {
                refreshSecondsLeft = 10;
                updateTimerUI();
                return;
            }

            refreshSecondsLeft--;
            if (refreshSecondsLeft <= 0) {
                fetchTasks(true); // silent refresh
                refreshSecondsLeft = 10;
            }
            updateTimerUI();
        }, 1000);

        function updateTimerUI() {
            document.getElementById('auto-refresh-timer').innerText = refreshSecondsLeft + 's';
        }

        async function fetchLists() {
            try {
                const response = await fetch('/api/lists');
                const lists = await response.json();
                const container = document.getElementById('list-container');
                
                // Reset and keep "All"
                allListIds = [null];
                const allChip = document.getElementById('chip-all');
                container.innerHTML = '';
                container.appendChild(allChip);

                lists.forEach(list => {
                    allListIds.push(list.id);
                    const chip = document.createElement('div');
                    chip.id = `chip-${list.id}`;
                    chip.className = 'chip px-4 py-2 rounded-xl border border-slate-200 bg-white text-slate-600 text-sm font-semibold shadow-sm transition-all';
                    chip.innerHTML = `<i class="fas fa-list-ul mr-2 opacity-40"></i>${list.name}`;
                    chip.onclick = () => selectList(list.id);
                    container.appendChild(chip);
                });
            } catch (err) { console.error('Failed to fetch lists', err); }
        }

        function selectList(id) {
            currentListId = id;
            // Update UI
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active', 'ring-2', 'ring-blue-500/20', 'border-blue-500'));
            
            let activeChip;
            if (id === null) {
                activeChip = document.getElementById('chip-all');
            } else {
                activeChip = document.getElementById(`chip-${id}`);
            }

            if (activeChip) {
                activeChip.classList.add('active');
                // Scroll active chip into view
                activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            fetchTasks();
        }

        // Swipe Detection Logic
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = touchEndX - touchStartX;
            if (Math.abs(swipeDistance) < minSwipeDistance) return;

            // Prevent swipe when user is interacting with input
            if (document.activeElement === document.getElementById('task-input')) return;

            const currentIndex = allListIds.indexOf(currentListId);
            if (currentIndex === -1) return;

            if (swipeDistance > 0) {
                // Swipe Right (Go to Previous List)
                if (currentIndex > 0) {
                    selectList(allListIds[currentIndex - 1]);
                }
            } else {
                // Swipe Left (Go to Next List)
                if (currentIndex < allListIds.length - 1) {
                    selectList(allListIds[currentIndex + 1]);
                }
            }
        }

        async function fetchTasks(silent = false) {
            const loading = document.getElementById('loading');
            const taskList = document.getElementById('task-list');
            const emptyState = document.getElementById('empty-state');
            const refreshIcon = document.getElementById('refresh-icon');

            if (!silent) {
                loading.classList.remove('hidden');
                taskList.classList.add('hidden');
                emptyState.classList.add('hidden');
            }
            refreshIcon.classList.add('fa-spin');

            try {
                const url = currentListId ? `/api/tasks?list_id=${currentListId}` : '/api/tasks';
                const response = await fetch(url);
                const tasks = await response.json();

                if (tasks.length === 0) {
                    taskList.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                } else {
                    renderTasks(tasks);
                    taskList.classList.remove('hidden');
                    emptyState.classList.add('hidden');
                }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.add('hidden');
                refreshIcon.classList.remove('fa-spin');
                refreshSecondsLeft = 10;
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('task-list');
            container.innerHTML = '';

            tasks.forEach(task => {
                const card = document.createElement('div');
                card.id = `task-${task.id}`;
                card.className = 'group task-card bg-white p-4 rounded-2xl border border-slate-200 flex items-center space-x-4 shadow-sm hover:shadow-md hover:border-blue-100 transition-all';
                
                const isUrgent = task.importance === 'high';
                const isOverdue = task.due_date && new Date(task.due_date) < new Date(new Date().setHours(0,0,0,0));
                
                card.innerHTML = `
                    <div class="flex-shrink-0">
                        <div class="relative w-6 h-6 group/check">
                            <input type="checkbox" 
                                   onchange="completeTask('${task.list_id}', '${task.id}')"
                                   class="peer appearance-none w-6 h-6 rounded-full border-2 border-slate-200 checked:bg-blue-500 checked:border-blue-500 transition-all cursor-pointer">
                            <i class="fas fa-check absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[10px] text-white opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="flex-grow min-w-0">
                        <div class="flex items-center space-x-2">
                            <h3 class="text-[15px] font-bold text-slate-700 truncate group-hover:text-blue-900 transition-colors">
                                ${task.title}
                            </h3>
                            ${isUrgent ? '<i class="fas fa-fire text-orange-500 text-xs animate-pulse" title="중요"></i>' : ''}
                        </div>
                        <div class="flex items-center text-[11px] mt-1.5 space-x-3 text-slate-400 font-medium">
                            <span class="flex items-center px-2 py-0.5 bg-slate-50 rounded-lg text-slate-500 border border-slate-100">
                                <i class="fas fa-folder-open mr-1.5 text-[10px] opacity-60"></i>${task.list_name}
                            </span>
                            ${task.due_date ? `
                                <span class="flex items-center ${isOverdue ? 'text-rose-500 bg-rose-50 px-2 py-0.5 rounded-lg border border-rose-100' : ''}">
                                    <i class="far fa-calendar-check mr-1.5 text-[10px] opacity-60"></i>${formatDate(task.due_date)}
                                </span>
                            ` : ''}
                        </div>
                    </div>
                    <div class="flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                         <button class="p-2 text-slate-300 hover:text-slate-600 transition-colors">
                            <i class="fas fa-ellipsis-v text-xs"></i>
                         </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            if (d.toDateString() === now.toDateString()) return '오늘';
            return (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
        }

        async function addTask() {
            const input = document.getElementById('task-input');
            const title = input.value.trim();
            if (!title) return;
            
            // Default to first list if "All" is selected
            let targetListId = currentListId;
            if (!targetListId) {
                const firstChip = document.querySelectorAll('.chip')[1]; // Skip "All"
                if (firstChip) {
                    targetListId = firstChip.id.replace('chip-', '');
                } else {
                    alert('목록 정보를 불러오는 중입니다. 잠시만 기다려주세요.');
                    return;
                }
            }

            isProcessing = true;
            input.disabled = true;

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, list_id: targetListId })
                });
                if (response.ok) {
                    input.value = '';
                    await fetchTasks();
                }
            } finally {
                input.disabled = false;
                isProcessing = false;
                input.focus();
            }
        }

        async function completeTask(listId, taskId) {
            const card = document.getElementById(`task-${taskId}`);
            card.classList.add('completed');
            
            try {
                await fetch(`/api/complete/${listId}/${taskId}`, { method: 'POST' });
                card.classList.add('fade-out');
                setTimeout(() => card.remove(), 400);
            } catch (err) {
                card.classList.remove('completed');
                card.querySelector('input').checked = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('list-container');
            
            // Mouse wheel horizontal scroll
            listContainer.addEventListener('wheel', (evt) => {
                if (evt.deltaY !== 0) {
                    evt.preventDefault();
                    listContainer.scrollLeft += evt.deltaY;
                }
            });

            // Mouse drag scroll
            let isDown = false;
            let startX;
            let scrollLeft;

            listContainer.addEventListener('mousedown', (e) => {
                isDown = true;
                listContainer.classList.add('active-drag');
                startX = e.pageX - listContainer.offsetLeft;
                scrollLeft = listContainer.scrollLeft;
            });
            listContainer.addEventListener('mouseleave', () => {
                isDown = false;
            });
            listContainer.addEventListener('mouseup', () => {
                isDown = false;
            });
            listContainer.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - listContainer.offsetLeft;
                const walk = (x - startX) * 2; // scroll-fast
                listContainer.scrollLeft = scrollLeft - walk;
            });

            fetchLists();
            fetchTasks();
        });
    </script>
</body>
</html>
