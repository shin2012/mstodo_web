<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할 일 | Microsoft To Do</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background-color: #f8fafc; 
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Enhanced Animated Background */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            overflow: hidden;
            transition: opacity 1s ease;
        }
        .bg-animate.hidden-blobs .blob {
            display: none;
        }
        .blob {
            position: absolute;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(59, 130, 246, 0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: move 15s infinite alternate ease-in-out;
        }
        .blob-2 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(99, 102, 241, 0) 70%);
            top: 10%; right: -5%;
            animation-duration: 20s; animation-delay: -5s;
        }
        .blob-3 {
            width: 1000px; height: 1000px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, rgba(37, 99, 235, 0) 70%);
            bottom: -10%; left: -5%;
            animation-duration: 25s; animation-delay: -10s;
        }
        @keyframes move {
            0% { transform: translate(-10%, -10%) rotate(0deg) scale(1); }
            100% { transform: translate(15%, 15%) rotate(90deg) scale(1.1); }
        }

        /* Weather Effects */
        #weather-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .rain {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            width: 1.5px; height: 15px; top: -20px;
            animation: fall linear infinite;
        }
        .snow {
            position: absolute;
            background: white;
            border-radius: 50%; top: -10px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* Sun glare for Clear weather */
        .sun-glare {
            position: absolute;
            top: -10%; right: -10%; width: 60%; height: 60%;
            background: radial-gradient(circle, rgba(255, 253, 230, 0.15) 0%, rgba(255, 253, 230, 0) 70%);
            filter: blur(40px);
            z-index: -1;
            opacity: 0; transition: opacity 2s ease;
        }
        .sun-glare.active { opacity: 1; animation: pulse-glare 10s infinite alternate ease-in-out; }
        @keyframes pulse-glare {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }

        /* Sparkles for Clear weather */
        .sparkle {
            position: absolute;
            background: white; border-radius: 50%;
            opacity: 0; animation: sparkle-anim 4s infinite linear;
        }
        @keyframes sparkle-anim {
            0%, 100% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 0.3; }
        }

        .cloud-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(148, 163, 184, 0.1);
            backdrop-filter: blur(2px);
            opacity: 0; transition: opacity 2s ease;
        }
        .cloud-overlay.active { opacity: 1; }
        .cloud-overlay.heavy { background: rgba(100, 116, 139, 0.2); backdrop-filter: blur(5px); }

        /* Mist/Fog */
        .mist-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 100%);
            opacity: 0; transition: opacity 3s ease;
            backdrop-filter: blur(8px);
        }
        .mist-overlay.active { opacity: 1; }

        /* Thunder Flash */
        .thunder-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 10;
        }
        .flash-active { animation: flash-anim 0.5s ease-out; }
        @keyframes flash-anim {
            0% { opacity: 0; }
            10% { opacity: 0.3; }
            20% { opacity: 0; }
            25% { opacity: 0.4; }
            100% { opacity: 0; }
        }

        /* Compact Layout */
        .task-card { 
            transition: all 0.2s ease; 
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid #f1f5f9;
            padding-top: 0.75rem !important;
            padding-bottom: 0.75rem !important;
        }
        .task-card:hover { 
            transform: translateY(-1px); 
            box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.05); 
            border-color: #cbd5e1;
        }
        .completed { text-decoration: line-through; color: #94a3b8; opacity: 0.6; }
        .fade-out { opacity: 0; transform: translateX(20px); transition: all 0.4s ease; }
        
        .chip { transition: all 0.2s; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
        .chip.active { background-color: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2); }
        
        .sidebar-item { transition: all 0.2s; cursor: pointer; border-radius: 0.5rem; white-space: nowrap; margin-bottom: 2px; }
        .sidebar-item.active { background-color: #3b82f6 !important; color: white !important; box-shadow: 0 4px 8px rgba(59, 130, 246, 0.15); }
        .sidebar-item:hover:not(.active) { background-color: #f1f5f9; }

        /* List Groups */
        .group-header { cursor: pointer; user-select: none; }
        .group-content { transition: max-height 0.3s ease-out; overflow: hidden; }
        .group-content.collapsed { max-height: 0 !important; }
        .rotate-icon { transition: transform 0.2s; }
        .collapsed .rotate-icon { transform: rotate(-90deg); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sidebar { height: calc(100vh - 4rem); position: sticky; top: 2rem; }

        /* Inline Edit Styling */
        [contenteditable="true"]:focus {
            outline: none;
            background: rgba(241, 245, 249, 0.8);
            border-radius: 4px;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
            padding: 0 4px;
        }
        
        .star-btn:hover i { transform: scale(1.2); }

        /* Due Date Button */
        .due-date-btn { opacity: 0; transition: opacity 0.2s; }
        .task-card:hover .due-date-btn { opacity: 1; }

        /* Date Picker Popup */
        #date-picker-popup {
            position: absolute;
            z-index: 50;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 12px;
            width: 180px;
        }
        </style>
        </head>
        <body class="p-4 md:p-8">
        <div id="date-picker-popup" class="hidden">
        <div class="relative mb-2">
            <input type="text" id="date-input-field" 
                   class="w-full p-2 pr-10 border rounded text-sm outline-none focus:ring-2 focus:ring-blue-500/20 font-bold text-slate-700"
                   readonly onclick="document.getElementById('hidden-date-picker').showPicker()">
            <div class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                <i class="far fa-calendar-alt"></i>
            </div>
            <input type="date" id="hidden-date-picker" class="absolute opacity-0 pointer-events-none" 
                   onchange="handleHiddenDateChange(this.value)">
        </div>
        <div class="flex flex-col space-y-1">
            <button onclick="applyDueDate()" class="bg-blue-500 text-white text-[11px] font-bold py-1.5 rounded hover:bg-blue-600 transition-all">적용</button>
            <button onclick="clearDueDate()" class="bg-rose-50 text-rose-500 text-[11px] font-bold py-1.5 rounded hover:bg-rose-100 transition-all border border-rose-100">기한 삭제</button>
            <button onclick="closeDatePicker()" class="text-slate-400 text-[11px] font-bold py-1 rounded hover:bg-slate-50 transition-all">취소</button>
        </div>
        </div>
<body class="p-4 md:p-8">
    <div class="bg-animate">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div id="weather-layer">
        <div class="sun-glare"></div>
        <div class="cloud-overlay"></div>
        <div class="mist-overlay"></div>
        <div class="thunder-flash"></div>
    </div>

    <div class="max-w-6xl mx-auto relative">
        <div class="flex flex-col gap-4">
            <!-- Sidebar (Desktop Viewport) -->
            
<!-- Drawer Overlay -->
<div id="drawer-overlay" class="fixed inset-0 bg-black/30 z-40 hidden opacity-0 transition-opacity duration-300" onclick="toggleDrawer()"></div>
<aside id="mobile-drawer" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#f8fafc] shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col p-6 overflow-y-auto">
    <button onclick="toggleDrawer()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 text-slate-500">
        <i class="fas fa-times"></i>
    </button>

                <div class="sidebar flex flex-col h-full">
                    <a href="javascript:void(0)" onclick="selectList(null)" class="mb-8 px-1 flex items-center space-x-3 group">
                        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                            <i class="fas fa-check-double text-white text-sm"></i>
                        </div>
                        <div class="flex flex-col">
                            <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-none">to-do list</h1>
                            <span id="desktop-clock" class="text-[10px] font-semibold text-slate-400 mt-1 tracking-wider"></span>
                        </div>
                    </a>

                    <!-- Special Menu: All Tasks -->
                    <div class="px-2 mb-4">
                        <div onclick="selectList(null)" id="all-tasks-btn" class="sidebar-item group flex items-center px-4 py-2.5 text-slate-500 font-bold hover:bg-white/60 transition-all text-[14px]">
                            <i class="fas fa-list-ul mr-3 opacity-40 group-[.active]:opacity-100 text-sm"></i>
                            <span>모든 할 일</span>
                        </div>
                    </div>

                    <nav class="space-y-1 overflow-y-auto no-scrollbar flex-grow" id="sidebar-list">
                        <!-- Groups and Lists will be injected here -->
                    </nav>

                    <div class="mt-auto pt-6 px-2 flex items-center justify-start">
                        <a href="/settings" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-white shadow-sm border border-slate-200 text-slate-600 font-bold text-[14px] hover:text-blue-600 transition-all w-full" title="설정">
                            <i class="fas fa-cog text-lg"></i>
                            <span>환경 설정</span>
                        </a>
                    </div>
                </div>
            </aside>

            <!-- Mobile Viewport -->
            <div class="w-full">
                <header class="mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center space-x-3">
                            <a href="javascript:void(0)" onclick="selectList(null)" class="flex items-center space-x-2 group">
                                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform shadow-lg shadow-blue-500/20">
                                    <i class="fas fa-check-double text-white text-[12px]"></i>
                                </div>
                                <div class="flex flex-col">
                                    <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-none">to-do list</h1>
                                    <span id="mobile-clock" class="text-[9px] font-semibold text-slate-400 mt-0.5 tracking-wider"></span>
                                </div>
                            </a>
                        </div>
                        <button onclick="toggleDrawer()" class="w-11 h-11 flex items-center justify-center rounded-2xl bg-white shadow-md border border-slate-100 text-slate-600 active:scale-95 transition-all">
                            <i class="fas fa-bars text-lg"></i>
                        </button>
                    </div>
                    <!-- Mobile Chips with No-Wrap and Horizontal Scroll -->
                    <div id="list-container" class="hidden">
                        <button onclick="selectList(null)" id="all-tasks-chip" class="flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold transition-all bg-white shadow-sm border border-slate-200 text-blue-600">모든 할 일</button>
                        <!-- Lists injected here -->
                    </div>
                </header>
            </div>

            <!-- Main Content -->
            <main class="flex-grow max-w-3xl">
                <!-- Task Input (Restored Spacious Size) -->
                <div class="relative group mb-6 md:mb-8">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                        <i class="fas fa-pen-nib"></i>
                    </div>
                    <input type="text" id="task-input" 
                           placeholder="어떤 일을 완료할까요?"
                           class="w-full pl-11 pr-12 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-slate-700 font-medium text-[15px]"
                           onkeypress="if(event.key === 'Enter') addTask()">
                    <button onclick="addTask()" class="absolute right-2 top-2 bottom-2 px-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl transition-all shadow-md hover:shadow-lg active:scale-95">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

                <!-- Loading State -->
                <div id="loading" class="flex flex-col items-center justify-center py-24 space-y-4">
                    <div class="relative w-12 h-12">
                        <div class="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <p class="text-sm font-semibold text-slate-400 animate-pulse">할 일을 불러오는 중...</p>
                </div>

                <!-- Task List (Initial Spacious Gap) -->
                <div id="task-list" class="space-y-3 hidden">
                    <!-- Tasks injected here -->
                </div>

                <!-- Empty State (Initial Spacious Style) -->
                <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 bg-white rounded-3xl border border-dashed border-slate-200 shadow-inner">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                        <i class="fas fa-check-double text-slate-200 text-4xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-700 mb-1">모든 할 일을 마쳤습니다!</h3>
                    <p class="text-slate-400 text-sm font-medium">새로운 할 일을 추가하고 오늘을 기록해보세요.</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        let currentListId = null;
        let isProcessing = false;
        let cachedTasks = [];
        let allLists = [];
        let userGroups = [];

        async function fetchLists() {
            try {
                const [listsResp, groupsResp] = await Promise.all([
                    fetch('/api/lists'),
                    fetch('/api/groups')
                ]);
                allLists = await listsResp.json();
                const groupsData = await groupsResp.json();
                userGroups = groupsData.groups || [];

                // Process ungrouped lists: auto-group them into '기타 목록'
                const groupedListIds = new Set(userGroups.flatMap(g => g.lists));
                const ungroupedListIds = allLists.map(l => l.id).filter(id => !groupedListIds.has(id));

                if (ungroupedListIds.length > 0) {
                    let otherGroup = userGroups.find(g => g.name === '기타 목록');
                    if (!otherGroup) {
                        otherGroup = { name: '기타 목록', lists: [], collapsed: false };
                        userGroups.push(otherGroup);
                    }
                    const existingInOther = new Set(otherGroup.lists);
                    ungroupedListIds.forEach(id => {
                        if (!existingInOther.has(id)) otherGroup.lists.push(id);
                    });
                    await saveGroups();
                }

                renderSidebar();
                renderMobileChips();

                // Always start with All Tasks (null) or restore currentListId if navigating
                selectList(currentListId);

                // Trigger initial sync for lists and tasks in the background
                triggerSync();
            } catch (err) { console.error('Failed to fetch lists or groups', err); }
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-list');
            container.innerHTML = '';

            // Grouped Lists
            userGroups.forEach((group, groupIdx) => {
                const groupEl = document.createElement('div');
                groupEl.className = `mb-2 ${group.collapsed ? 'collapsed' : ''}`;

                const header = document.createElement('div');
                header.id = `side-chip-group_${groupIdx}`;
                header.className = `sidebar-item group-header group flex items-center justify-between px-4 py-2.5 text-slate-500 font-bold hover:bg-white/60 transition-all rounded-lg ${currentListId === 'group_' + groupIdx ? 'active' : ''}`;
                header.onclick = (e) => {
                    if (e.target.closest('.action-btn')) return;
                    selectList(`group_${groupIdx}`);
                };
                header.innerHTML = `
                    <div class="flex items-center space-x-3 flex-grow min-w-0">
                        <div class="action-btn cursor-pointer flex items-center justify-center w-5 h-5 opacity-40 hover:opacity-100 flex-shrink-0 group-[.active]:opacity-100" onclick="toggleGroup(${groupIdx}); event.stopPropagation();">
                            <i class="fas fa-chevron-down text-sm rotate-icon flex-shrink-0 ${group.collapsed ? 'collapsed' : ''}"></i>
                        </div>
                        <span class="group-name text-[14px] truncate outline-none">${group.name}</span>
                    </div>
                `;

                const content = document.createElement('div');
                content.className = `group-content space-y-0.5 mt-1 ${group.collapsed ? 'collapsed' : ''}`;

                group.lists.forEach(listId => {
                    const list = allLists.find(l => l.id === listId);
                    if (list) {
                        content.appendChild(createSidebarItem(list));
                    }
                });

                groupEl.appendChild(header);
                groupEl.appendChild(content);
                container.appendChild(groupEl);
            });
        }

        function createSidebarItem(list) {
            const item = document.createElement('div');
            item.id = `side-chip-${list.id}`;
            item.dataset.listId = list.id;
            item.className = `sidebar-item group flex items-center px-4 py-2.5 text-slate-500 font-bold hover:bg-white/60 transition-all text-[14px] ${currentListId === list.id ? 'active' : ''}`;
            
            let icon = 'fa-list-ul';
            if (list.wellKnownName === 'defaultList') icon = 'fa-inbox';
            else if (list.wellKnownName === 'flaggedEmails') icon = 'fa-envelope';
            
            item.innerHTML = `
                <i class="fas ${icon} mr-3 opacity-40 group-[.active]:opacity-100 text-sm"></i>
                <span class="truncate">${list.name}</span>
            `;
            item.onclick = () => selectList(list.id);
            return item;
        }

        function renderMobileChips() {
            const mobileContainer = document.getElementById('list-container');
            mobileContainer.innerHTML = '';
            allLists.forEach(list => {
                const chip = document.createElement('div');
                chip.id = `chip-${list.id}`;
                chip.className = `chip px-4 py-2 rounded-xl border border-slate-200 bg-white text-slate-600 text-[13px] font-bold shadow-sm transition-all ${currentListId === list.id ? 'active' : ''}`;
                chip.innerHTML = `${list.name}`;
                chip.onclick = () => selectList(list.id);
                mobileContainer.appendChild(chip);
            });
        }

        async function saveGroups() {
            await fetch('/api/groups', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    groups: userGroups
                })
            });
        }

        let activeDatePicker = { listId: null, taskId: null };

        function showDueDateMenu(btn, listId, taskId, currentDate = null) {
            const popup = document.getElementById('date-picker-popup');
            const rect = btn.getBoundingClientRect();
            
            activeDatePicker = { listId, taskId };
            const dateValue = currentDate || new Date().toISOString().split('T')[0];
            
            // 텍스트박스에 요일 포함 표시
            document.getElementById('date-input-field').value = formatDate(dateValue);
            // 숨겨진 피커에는 YYYY-MM-DD만 저장
            document.getElementById('hidden-date-picker').value = dateValue;
            
            popup.style.top = `${rect.bottom + window.scrollY + 5}px`;
            popup.style.left = `${rect.left + window.scrollX - 50}px`;
            popup.classList.remove('hidden');

            // Close when clicking outside
            setTimeout(() => {
                const closeHandler = (e) => {
                    if (!popup.contains(e.target) && !btn.contains(e.target)) {
                        closeDatePicker();
                        document.removeEventListener('click', closeHandler);
                    }
                };
                document.addEventListener('click', closeHandler);
            }, 10);
        }

        function handleHiddenDateChange(value) {
            if (value) {
                document.getElementById('date-input-field').value = formatDate(value);
            }
        }

        function closeDatePicker() {
            document.getElementById('date-picker-popup').classList.add('hidden');
        }

        async function applyDueDate() {
            const date = document.getElementById('hidden-date-picker').value;
            if (date) {
                await setDueDate(activeDatePicker.listId, activeDatePicker.taskId, date);
                closeDatePicker();
            }
        }

        async function clearDueDate() {
            await setDueDate(activeDatePicker.listId, activeDatePicker.taskId, null);
            closeDatePicker();
        }

        function selectList(id) {
            currentListId = id;
            
            // Update UI for All Tasks
            const allBtn = document.getElementById('all-tasks-btn');
            const allChip = document.getElementById('all-tasks-chip');
            if (id === null) {
                if (allBtn) allBtn.classList.add('active');
                if (allChip) allChip.classList.add('active');
            } else {
                if (allBtn) allBtn.classList.remove('active');
                if (allChip) allChip.classList.remove('active');
            }

            document.querySelectorAll('.chip').forEach(c => {
                if (c.id === 'all-tasks-chip') return;
                c.classList.remove('active');
            });
            const activeChip = document.getElementById(`chip-${id}`);
            if (activeChip) {
                activeChip.classList.add('active');
                activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            document.querySelectorAll('.sidebar-item').forEach(c => c.classList.remove('active'));
            const activeSide = document.getElementById(`side-chip-${id}`);
            if (activeSide) activeSide.classList.add('active');
            
            fetchTasks();
            triggerSync(); // Background sync on every navigation
        }

        function getQueryForCurrentSelection() {
            if (!currentListId) return '';
            if (currentListId.startsWith('group_')) {
                const groupIdx = parseInt(currentListId.split('_')[1]);
                const group = userGroups[groupIdx];
                if (group && group.lists.length > 0) {
                    return `?list_ids=${group.lists.join(',')}`;
                }
                return `?list_ids=none`; // Empty group
            }
            return `?list_id=${currentListId}`;
        }

        async function triggerSync(force = false) {
            const icons = [document.getElementById('refresh-icon-mobile'), document.getElementById('refresh-icon-desktop')];
            icons.forEach(i => i && i.classList.add('fa-spin'));

            try {
                let query = getQueryForCurrentSelection();
                // For triggerSync, if it's a group, we might want to sync the specific lists. 
                // Currently backend doesn't support list_ids for sync, so we just sync all or the specific list.
                let syncUrl = `/api/sync/all`;
                if (currentListId && !currentListId.startsWith('group_')) {
                    syncUrl += `?list_id=${currentListId}`;
                }
                if (force) syncUrl += (syncUrl.includes('?') ? '&' : '?') + 'force=1';

                const response = await fetch(syncUrl);
                const result = await response.json();
                if (result.has_changes || force) {
                    fetchTasks(true);
                }
            } catch (err) {
                console.error('Sync failed', err);
            } finally {
                icons.forEach(i => i && i.classList.remove('fa-spin'));
            }
        }
        
        async function fetchTasks(silent = false) {
            const loading = document.getElementById('loading');
            const taskList = document.getElementById('task-list');
            const emptyState = document.getElementById('empty-state');

            let loadingTimeout = null;
            if (!silent) {
                loadingTimeout = setTimeout(() => {
                    loading.classList.remove('hidden');
                    taskList.classList.add('hidden');
                    emptyState.classList.add('hidden');
                }, 50); // Delay spinner for 50ms (faster than flicker)
            }

            try {
                const query = getQueryForCurrentSelection();
                const url = `/api/tasks${query}`;
                const response = await fetch(url);
                cachedTasks = await response.json();
                
                if (loadingTimeout) clearTimeout(loadingTimeout);
                loading.classList.add('hidden');

                if (cachedTasks.length === 0) {
                    taskList.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                } else {
                    sortAndRenderTasks();
                    taskList.classList.remove('hidden');
                    emptyState.classList.add('hidden');
                }
            } catch (err) { 
                if (loadingTimeout) clearTimeout(loadingTimeout);
                console.error(err); 
            } 
            finally {
                loading.classList.add('hidden');
            }
        }

        function sortAndRenderTasks() {
            cachedTasks.sort((a, b) => {
                const aImp = a.importance === 'high' ? 0 : 1;
                const bImp = b.importance === 'high' ? 0 : 1;
                if (aImp !== bImp) return aImp - bImp;
                if (a.due_date && !b.due_date) return -1;
                if (!a.due_date && b.due_date) return 1;
                if (a.due_date && b.due_date) return a.due_date.localeCompare(b.due_date);
                return 0;
            });
            renderTasks(cachedTasks);
        }

        function parseDate(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.split('-');
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        function renderTasks(tasks) {
            const container = document.getElementById('task-list');
            container.innerHTML = '';
            
            const activeTasks = tasks.filter(t => t.status !== 'completed');
            const completedTasks = tasks.filter(t => t.status === 'completed');
            
            // Sort completed tasks by completed_date_time DESC
            completedTasks.sort((a, b) => {
                const aTime = a.completed_date_time || '';
                const bTime = b.completed_date_time || '';
                return bTime.localeCompare(aTime);
            });

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            const yesterday = new Date(today);
            yesterday.setDate(today.getDate() - 1);
            const endOfWeek = new Date(today);
            const diff = 7 - (today.getDay() === 0 ? 7 : today.getDay());
            endOfWeek.setDate(today.getDate() + diff);
            endOfWeek.setHours(23, 59, 59, 999);

            activeTasks.forEach(task => {
                container.appendChild(createTaskCard(task, today, tomorrow, yesterday, endOfWeek));
            });

            // Show completed tasks
            if (completedTasks.length > 0 && currentListId && !currentListId.startsWith('group_')) {
                const hr = document.createElement('div');
                hr.className = 'my-6 border-t border-slate-200/50';
                container.appendChild(hr);

                const isCollapsed = localStorage.getItem(`completedCollapsed_${currentListId}`) === 'true';

                const header = document.createElement('div');
                header.className = 'flex items-center space-x-2 mb-4 px-2 cursor-pointer';
                header.onclick = () => {
                    const content = document.getElementById('completed-tasks-container');
                    const icon = document.getElementById('completed-toggle-icon');
                    const currentlyHidden = content.classList.toggle('hidden');
                    icon.classList.toggle('-rotate-90', currentlyHidden);
                    localStorage.setItem(`completedCollapsed_${currentListId}`, currentlyHidden);
                };
                header.innerHTML = `
                    <i id="completed-toggle-icon" class="fas fa-chevron-down text-[10px] text-slate-400 transition-transform ${isCollapsed ? '-rotate-90' : ''}"></i>
                    <span class="text-[13px] font-bold text-slate-500">완료됨 (${completedTasks.length})</span>
                `;
                container.appendChild(header);

                const completedContainer = document.createElement('div');
                completedContainer.id = 'completed-tasks-container';
                completedContainer.className = `space-y-4 ${isCollapsed ? 'hidden' : ''}`;
                completedTasks.forEach(task => {
                    completedContainer.appendChild(createTaskCard(task, today, tomorrow, yesterday, endOfWeek));
                });
                container.appendChild(completedContainer);
            }
        }

        function createTaskCard(task, today, tomorrow, yesterday, endOfWeek) {
                const card = document.createElement('div');
                card.id = `task-${task.id}`;

                const isImportant = task.importance === 'high';
                const isCompleted = task.status === 'completed';
                const dueDate = parseDate(task.due_date);

                const isToday = dueDate && dueDate.getTime() === today.getTime();
                const isTomorrow = dueDate && dueDate.getTime() === tomorrow.getTime();
                const isYesterday = dueDate && dueDate.getTime() === yesterday.getTime();
                const isOverdue = dueDate && dueDate.getTime() < today.getTime();
                const isThisWeek = dueDate && !isToday && !isTomorrow && !isYesterday && !isOverdue && dueDate <= endOfWeek;
                
                let borderColor = 'border-slate-100';
                let bgColor = 'bg-white';
                let borderSize = 'border';
                
                if (isCompleted) {
                    borderColor = 'border-slate-100';
                    bgColor = 'bg-slate-50/50';
                } else if (isImportant) {
                    borderColor = 'border-amber-400';
                    bgColor = 'bg-amber-50/30';
                    borderSize = 'border-2';
                } else if (isOverdue) {
                    borderColor = 'border-rose-400 shadow-sm';
                    bgColor = 'bg-rose-50/20';
                    borderSize = 'border-[1.5px]';
                } else if (isToday) {
                    borderColor = 'border-emerald-400 shadow-sm';
                    bgColor = 'bg-emerald-50/20';
                    borderSize = 'border-[1.5px]';
                } else if (isTomorrow) {
                    borderColor = 'border-blue-400 shadow-sm';
                    bgColor = 'bg-blue-50/10';
                    borderSize = 'border-[1.5px]';
                } else if (isThisWeek) {
                    borderColor = 'border-sky-300';
                    bgColor = 'bg-sky-50/5';
                }

                card.className = `group task-card ${bgColor} px-4 py-4 rounded-2xl ${borderSize} ${borderColor} flex flex-col transition-all ${isCompleted ? 'opacity-60' : ''}`;

                let subtasksHtml = '';
                if (task.subtasks && task.subtasks.length > 0) {
                    subtasksHtml = `
                        <div class="mt-3 ml-10 space-y-2 border-l-2 border-slate-100 pl-4 py-1">
                            ${task.subtasks.map(st => `
                                <div class="flex items-center space-x-3 group/sub">
                                    <input type="checkbox" ${st.isChecked ? 'checked' : ''}
                                           ${isCompleted ? 'disabled' : ''}
                                           onchange="toggleSubtask('${task.list_id}', '${task.id}', '${st.id}', this.checked, this)"
                                           class="w-4 h-4 rounded border-slate-400/60 text-blue-600 focus:ring-blue-500/30 cursor-pointer bg-white/50">
                                    <span class="text-[13px] ${st.isChecked ? 'line-through text-slate-400 font-medium' : 'text-slate-600 font-semibold'} transition-all outline-none"
                                          ${isCompleted ? '' : 'contenteditable="true"'}
                                          onblur="updateSubtaskTitle('${task.list_id}', '${task.id}', '${st.id}', this)"
                                          onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }">
                                        ${st.displayName}
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-center">
                        <div class="flex-shrink-0 mr-4">
                            <div class="relative w-6 h-6">
                                <input type="checkbox" ${isCompleted ? 'checked' : ''} onchange="completeTask('${task.list_id}', '${task.id}')"
                                       class="peer appearance-none w-6 h-6 rounded-full border-2 border-slate-400/50 hover:border-blue-500 checked:bg-blue-500 checked:border-blue-500 transition-all cursor-pointer shadow-sm bg-white/50">
                                <i class="fas fa-check absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[10px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="flex-grow min-w-0">
                            <div class="flex items-center justify-between">
                                <h3 class="text-[15px] font-bold text-slate-700 leading-snug outline-none min-w-0 ${isCompleted ? 'line-through text-slate-400' : ''}"
                                    ${isCompleted ? '' : 'contenteditable="true"'}
                                    onblur="updateTaskTitle('${task.list_id}', '${task.id}', this)"
                                    onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }">
                                    ${task.due_date ? `
                                        <span contenteditable="false" class="inline-flex items-center justify-center mr-1.5 text-[9px] font-black px-1.5 h-[14px] rounded shadow-sm border border-transparent whitespace-nowrap relative -top-[1px] align-middle ${isOverdue ? 'text-rose-500 bg-rose-50' : (isToday ? 'text-emerald-600 bg-emerald-50' : (isTomorrow ? 'text-blue-600 bg-blue-50' : 'text-slate-500 bg-slate-100'))}">
                                            ${formatDate(task.due_date)}
                                        </span>` : ''}
                                    ${task.title}
                                </h3>
                                <button onclick="toggleImportance('${task.list_id}', '${task.id}', '${task.importance}')"
                                        ${isCompleted ? 'disabled' : ''}
                                        class="star-btn flex-shrink-0 ml-3 focus:outline-none transition-all">
                                    ${isImportant ?
                                        '<i class="fas fa-star text-amber-500 text-lg"></i>' :
                                        '<i class="far fa-star text-slate-300 text-lg"></i>'}
                                </button>
                            </div>
                        </div>
                    </div>
                    ${subtasksHtml}
                `;
                return card;
        }

        async function setDueDate(listId, taskId, date) {
            try {
                const response = await fetch(`/api/tasks/${listId}/${taskId}/due`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ due_date: date })
                });
                if (response.ok) fetchTasks(true);
            } catch (err) { console.error(err); }
        }

        async function updateSubtaskTitle(listId, taskId, subtaskId, element) {
            const newTitle = element.innerText.trim();
            if (!newTitle) return;
            try {
                const response = await fetch(`/api/subtask/update/${listId}/${taskId}/${subtaskId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle })
                });
                if (!response.ok) throw new Error('Update failed');
            } catch (err) { console.error(err); alert('서브태스크 수정 중 오류가 발생했습니다.'); }
        }

        async function toggleSubtask(listId, taskId, subtaskId, checked, element) {
            const label = element.nextElementSibling;
            if (checked) {
                label.classList.add('line-through', 'text-slate-400', 'font-medium');
                label.classList.remove('text-slate-600', 'font-semibold');
            } else {
                label.classList.remove('line-through', 'text-slate-400', 'font-medium');
                label.classList.add('text-slate-600', 'font-semibold');
            }
            try {
                const response = await fetch(`/api/subtask/complete/${listId}/${taskId}/${subtaskId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ checked: checked })
                });
                if (!response.ok) throw new Error('Update failed');
            } catch (err) {
                element.checked = !checked;
                toggleSubtask(listId, taskId, subtaskId, !checked, element);
                alert('서브태스크 업데이트 중 오류가 발생했습니다.');
            }
        }

        function formatDate(dateStr) {
            const d = parseDate(dateStr);
            if (!d) return '';

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            const yesterday = new Date(today);
            yesterday.setDate(today.getDate() - 1);

            if (d.getTime() === today.getTime()) return '오늘';
            if (d.getTime() === tomorrow.getTime()) return '내일';
            if (d.getTime() === yesterday.getTime()) return '어제';

            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');

            return `${month}/${day}`;
        }
        async function addTask() {
            const input = document.getElementById('task-input');
            const title = input.value.trim();
            if (!title || isProcessing) return;
            isProcessing = true;
            input.disabled = true;
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, list_id: currentListId })
                });
                if (response.ok) { input.value = ''; await fetchTasks(); }
            } finally { input.disabled = false; isProcessing = false; input.focus(); }
        }

        async function completeTask(listId, taskId) {
            const card = document.getElementById(`task-${taskId}`);
            card.classList.add('completed');
            try {
                const resp = await fetch(`/api/complete/${listId}/${taskId}`, { method: 'POST' });
                if (resp.ok) {
                    card.classList.add('fade-out');
                    setTimeout(() => card.remove(), 400);
                } else { throw new Error('Fail'); }
            } catch (err) { card.classList.remove('completed'); card.querySelector('input').checked = false; }
        }

        async function updateTaskTitle(listId, taskId, element) {
            // Clone to remove non-editable badge if exists
            const clone = element.cloneNode(true);
            const badge = clone.querySelector('span');
            if (badge) badge.remove();
            
            const newTitle = clone.innerText.trim();
            if (!newTitle) return;
            try {
                await fetch(`/api/tasks/${listId}/${taskId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle })
                });
            } catch (err) { console.error(err); }
        }

        async function toggleImportance(listId, taskId, currentImportance) {
            const newImportance = currentImportance === 'high' ? 'normal' : 'high';
            const taskIndex = cachedTasks.findIndex(t => t.id === taskId);
            if (taskIndex !== -1) {
                cachedTasks[taskIndex].importance = newImportance;
                sortAndRenderTasks();
            }
            try {
                const response = await fetch(`/api/tasks/${listId}/${taskId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ importance: newImportance })
                });
                if (!response.ok) throw new Error('Fail');
            } catch (err) {
                if (taskIndex !== -1) {
                    cachedTasks[taskIndex].importance = currentImportance;
                    sortAndRenderTasks();
                }
            }
        }

        function initClock() {
            function updateClock() {
                const now = new Date();
                const days = ['일', '월', '화', '수', '목', '금', '토'];
                const month = now.getMonth() + 1;
                const date = now.getDate();
                const day = days[now.getDay()];
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                const timeString = `${month}월 ${date}일 (${day}) ${hours}:${minutes}:${seconds}`;
                
                const desktopClock = document.getElementById('desktop-clock');
                const mobileClock = document.getElementById('mobile-clock');
                if (desktopClock) desktopClock.innerText = timeString;
                if (mobileClock) mobileClock.innerText = timeString;
            }
            setInterval(updateClock, 1000);
            updateClock();
        }

        function initBackgroundBySun() {
            // Check background animation setting
            const bgAnimate = localStorage.getItem('bgAnimate') !== 'false';
            const bgContainer = document.querySelector('.bg-animate');
            if (!bgAnimate) {
                bgContainer.classList.add('hidden-blobs');
            } else {
                bgContainer.classList.remove('hidden-blobs');
            }

            const lat = 37.5665, lng = 126.9780;
            fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`)
                .then(res => res.json())
                .then(data => {
                    const now = new Date();
                    const sunrise = new Date(data.results.sunrise);
                    const sunset = new Date(data.results.sunset);
                    
                    const bg = document.querySelector('.bg-animate');
                    const blob1 = document.querySelector('.blob:not(.blob-2):not(.blob-3)');
                    const blob2 = document.querySelector('.blob-2');
                    const blob3 = document.querySelector('.blob-3');

                    let bgGrad = 'linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%)';
                    let c1 = '59, 130, 246';
                    let c2 = '99, 102, 241';
                    let c3 = '37, 99, 235';

                    const oneHour = 60 * 60 * 1000;
                    
                    if (now >= new Date(sunset.getTime() + oneHour) || now <= new Date(sunrise.getTime() - oneHour)) {
                        bgGrad = 'linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%)';
                        c1 = '49, 46, 129';
                        c2 = '30, 58, 138';
                        c3 = '88, 28, 135';
                    } else if (Math.abs(now - sunrise) <= oneHour) {
                        bgGrad = 'linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%)';
                        c1 = '249, 115, 22';
                        c2 = '234, 88, 12';
                        c3 = '250, 204, 21';
                    } else if (Math.abs(now - sunset) <= oneHour) {
                        bgGrad = 'linear-gradient(135deg, #fdf4ff 0%, #fae8ff 100%)';
                        c1 = '217, 70, 239';
                        c2 = '244, 63, 94';
                        c3 = '147, 51, 234';
                    }
                    
                    if(bg) bg.style.background = bgGrad;
                    if(blob1) blob1.style.background = `radial-gradient(circle, rgba(${c1}, 0.15) 0%, rgba(${c1}, 0) 70%)`;
                    if(blob2) blob2.style.background = `radial-gradient(circle, rgba(${c2}, 0.12) 0%, rgba(${c2}, 0) 70%)`;
                    if(blob3) blob3.style.background = `radial-gradient(circle, rgba(${c3}, 0.1) 0%, rgba(${c3}, 0) 70%)`;
                })
                .catch(err => console.error('Failed to fetch sun times', err));
        }

        async function initWeatherEffect() {
            const weatherEffect = localStorage.getItem('weatherEffect') !== 'false';
            const layer = document.getElementById('weather-layer');
            const sunGlare = layer.querySelector('.sun-glare');
            const cloudOverlay = layer.querySelector('.cloud-overlay');
            const mistOverlay = layer.querySelector('.mist-overlay');
            
            // Clear existing particles
            layer.querySelectorAll('.rain, .snow, .sparkle').forEach(el => el.remove());
            sunGlare.classList.remove('active');
            cloudOverlay.classList.remove('active', 'heavy');
            mistOverlay.classList.remove('active');
            if (window.thunderInterval) clearInterval(window.thunderInterval);

            if (!weatherEffect) return;

            try {
                const resp = await fetch('https://wttr.in/Seoul?format=j1');
                const data = await resp.json();
                const condition = data.current_condition[0];
                const code = parseInt(condition.weatherCode);
                
                // Weather Code Groups (WWO)
                const clearCodes = [113];
                const partlyCloudyCodes = [116];
                const cloudyCodes = [119, 122];
                const mistCodes = [143, 248, 260];
                const rainCodes = [176, 263, 266, 293, 296, 299, 302, 305, 308, 353, 356, 359];
                const snowCodes = [179, 227, 230, 323, 326, 329, 332, 335, 338, 368, 371, 392, 395];
                const thunderCodes = [200, 386, 389];

                if (thunderCodes.includes(code)) {
                    createParticles('rain', 35);
                    cloudOverlay.classList.add('active', 'heavy');
                    initThunder();
                } else if (rainCodes.includes(code)) {
                    createParticles('rain', 30);
                    cloudOverlay.classList.add('active', 'heavy');
                } else if (snowCodes.includes(code)) {
                    createParticles('snow', 20);
                    cloudOverlay.classList.add('active', 'heavy');
                } else if (mistCodes.includes(code)) {
                    mistOverlay.classList.add('active');
                } else if (cloudyCodes.includes(code)) {
                    cloudOverlay.classList.add('active', 'heavy');
                } else if (partlyCloudyCodes.includes(code)) {
                    cloudOverlay.classList.add('active');
                } else if (clearCodes.includes(code)) {
                    sunGlare.classList.add('active');
                    createSparkles(10);
                }
            } catch (err) {
                console.error('Weather fetch failed', err);
            }
        }

        function createSparkles(count) {
            const layer = document.getElementById('weather-layer');
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                const size = Math.random() * 2 + 1 + 'px';
                s.style.width = size; s.style.height = size;
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                s.style.animationDelay = Math.random() * 5 + 's';
                layer.appendChild(s);
            }
        }

        function initThunder() {
            const flash = document.querySelector('.thunder-flash');
            window.thunderInterval = setInterval(() => {
                if (Math.random() > 0.85) {
                    flash.classList.add('flash-active');
                    setTimeout(() => flash.classList.remove('flash-active'), 500);
                }
            }, 6000);
        }

        function createParticles(type, count) {
            const layer = document.getElementById('weather-layer');
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = type;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 1 + (type === 'rain' ? 0.5 : 2)) + 's';
                p.style.animationDelay = Math.random() * 2 + 's';
                if (type === 'snow') {
                    const size = Math.random() * 3 + 2 + 'px';
                    p.style.width = size;
                    p.style.height = size;
                    p.style.opacity = Math.random() * 0.5 + 0.3;
                }
                layer.appendChild(p);
            }
        }

        function initEyeTracking() {
            document.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX;
                const mouseY = e.clientY;

                const eyes = document.querySelectorAll('.eye');
                eyes.forEach(eye => {
                    const rect = eye.getBoundingClientRect();
                    const eyeX = rect.left + rect.width / 2;
                    const eyeY = rect.top + rect.height / 2;

                    const angle = Math.atan2(mouseY - eyeY, mouseX - eyeX);
                    const distance = Math.min(rect.width / 4, rect.height / 4); // max distance pupil can move

                    const pupilX = Math.cos(angle) * distance;
                    const pupilY = Math.sin(angle) * distance;

                    const pupil = eye.querySelector('.pupil');
                    if (pupil) {
                        pupil.style.transform = `translate(calc(-50% + ${pupilX}px), calc(-50% + ${pupilY}px))`;
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchLists();
            initClock();
            initBackgroundBySun();
            initWeatherEffect();
            initEyeTracking();
            setInterval(initBackgroundBySun, 10 * 60 * 1000);
            setInterval(initWeatherEffect, 30 * 60 * 1000);
        });    
        function toggleDrawer() {
            const drawer = document.getElementById('mobile-drawer');
            const overlay = document.getElementById('drawer-overlay');
            
            if (drawer.classList.contains('-translate-x-full')) {
                // Open
                drawer.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                // slight delay for opacity transition
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                // Close
                drawer.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }
        
        // When a list is selected, auto-close the drawer on mobile
        const originalSelectList = selectList;
        selectList = function(listId) {
            originalSelectList(listId);
            const drawer = document.getElementById('mobile-drawer');
            if (drawer && !drawer.classList.contains('-translate-x-full')) {
                toggleDrawer();
            }
        };

</script>
</body>
</html>
